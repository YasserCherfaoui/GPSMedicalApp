name: gps_medical_shared
description: Shared Dart library for GPS Médical patient and specialist mobile apps.
version: 0.0.1
publish_to: none

environment:
  sdk: ^3.8.0
  flutter: ">=3.32.0"

dependencies:
  built_collection: ^5.1.1
  built_value: ^8.9.0
  dio: ^5.7.0
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_native_splash: ^2.4.4
  flutter_riverpod: ^2.6.1
  flutter_secure_storage: ^9.2.4
  geolocator: ^13.0.2
  go_router: ^14.8.1
  google_fonts: ^6.2.1
  google_maps_flutter: ^2.12.0
  gps_medical_api:
    path: packages/gps_medical_api
  intl: any
  package_info_plus: ^8.0.0
  permission_handler: ^11.3.1
  responsive_framework: ^1.5.1
  riverpod_annotation: ^2.6.1
  sentry_flutter: ^8.10.0
  shared_preferences: ^2.5.3
  toastification: ^3.0.3
dev_dependencies:
  build_runner: ^2.4.13
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter
  http_mock_adapter: ^0.6.1
  riverpod_generator: ^2.6.1

flutter:
  generate: true
