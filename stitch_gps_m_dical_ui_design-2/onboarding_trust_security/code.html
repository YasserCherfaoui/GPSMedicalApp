<!DOCTYPE html>

<html lang="fr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800&amp;family=Inter:wght@400;600&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "secondary-fixed-dim": "#bac9d3",
                    "secondary-container": "#d3e2ed",
                    "primary-fixed-dim": "#7ad7c6",
                    "primary": "#005e53",
                    "inverse-primary": "#7ad7c6",
                    "error": "#ba1a1a",
                    "on-secondary-fixed-variant": "#3b4951",
                    "on-secondary-fixed": "#0f1d25",
                    "error-container": "#ffdad6",
                    "on-secondary": "#ffffff",
                    "surface-variant": "#dfe3e1",
                    "inverse-surface": "#2d3130",
                    "on-tertiary": "#ffffff",
                    "on-primary-fixed": "#00201b",
                    "surface-container-highest": "#dfe3e1",
                    "secondary-fixed": "#d6e5ef",
                    "on-tertiary-container": "#ffe8e2",
                    "surface": "#f6faf8",
                    "on-primary-fixed-variant": "#005047",
                    "surface-container": "#ebefec",
                    "surface-container-lowest": "#ffffff",
                    "on-background": "#181d1b",
                    "surface-container-high": "#e5e9e7",
                    "outline-variant": "#bdc9c5",
                    "on-secondary-container": "#56656e",
                    "on-tertiary-fixed": "#3a0a00",
                    "primary-container": "#00796b",
                    "secondary": "#526069",
                    "inverse-on-surface": "#eef2ef",
                    "on-error-container": "#93000a",
                    "primary-fixed": "#97f3e2",
                    "tertiary-container": "#a2563f",
                    "surface-bright": "#f6faf8",
                    "surface-tint": "#006b5e",
                    "outline": "#6e7a76",
                    "on-primary-container": "#a1feec",
                    "on-error": "#ffffff",
                    "on-surface-variant": "#3e4946",
                    "tertiary-fixed-dim": "#ffb59f",
                    "on-tertiary-fixed-variant": "#75331f",
                    "on-surface": "#181d1b",
                    "tertiary": "#843f29",
                    "surface-dim": "#d7dbd8",
                    "surface-container-low": "#f0f4f2",
                    "on-primary": "#ffffff",
                    "background": "#f6faf8",
                    "tertiary-fixed": "#ffdbd1"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "md": "16px",
                    "xxl": "48px",
                    "gutter": "20px",
                    "xs": "4px",
                    "container-max": "1280px",
                    "sm": "8px",
                    "lg": "24px",
                    "unit": "4px",
                    "xl": "32px"
            },
            "fontFamily": {
                    "h3": ["Manrope"],
                    "body-lg": ["Inter"],
                    "h1": ["Manrope"],
                    "label-caps": ["Inter"],
                    "h2": ["Manrope"],
                    "body-md": ["Inter"]
            },
            "fontSize": {
                    "h3": ["24px", {"lineHeight": "1.4", "letterSpacing": "0em", "fontWeight": "600"}],
                    "h3-mobile": ["20px", {"lineHeight": "1.4", "letterSpacing": "0em", "fontWeight": "600"}],
                    "body-lg": ["18px", {"lineHeight": "1.6", "letterSpacing": "0em", "fontWeight": "400"}],
                    "h1": ["40px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "label-caps": ["12px", {"lineHeight": "1.0", "letterSpacing": "0.05em", "fontWeight": "600"}],
                    "h2": ["32px", {"lineHeight": "1.3", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                    "body-md": ["16px", {"lineHeight": "1.5", "letterSpacing": "0em", "fontWeight": "400"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bg-gradient-soft {
            background: radial-gradient(circle at top right, #E3F2FD 0%, #f6faf8 100%);
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .animate-float {
            animation: float 4s ease-in-out infinite;
        }
        .animate-float-delayed {
            animation: float 4s ease-in-out 1s infinite;
        }
        .animate-float-extra-delayed {
            animation: float 4s ease-in-out 2s infinite;
        }
    </style>
</head>
<body class="bg-background font-body-md text-on-surface min-h-screen flex flex-col items-center justify-between overflow-x-hidden bg-gradient-soft">
<!-- Top Navigation / Progress -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-gutter py-md bg-surface/80 backdrop-blur-xl">
<span class="font-h3 text-h3-mobile font-bold text-primary">GPS Médical</span>
<!-- Page Indicators -->
<div class="flex items-center gap-xs">
<div class="w-2 h-2 rounded-full bg-outline-variant"></div>
<div class="w-2 h-2 rounded-full bg-outline-variant"></div>
<div class="w-6 h-2 rounded-full bg-primary-container"></div>
</div>
<button class="font-label-caps text-label-caps text-secondary hover:opacity-80 transition-opacity">Passer</button>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 w-full max-w-container-max mx-auto flex flex-col items-center justify-center px-gutter pt-xxl pb-xxl">
<!-- Illustration Section: Replaced with structured UI components -->
<div class="relative w-full max-w-md aspect-square mb-xl flex items-center justify-center">
<!-- Glassmorphic Aura -->
<div class="absolute inset-0 bg-primary/5 rounded-full blur-3xl opacity-50 scale-75"></div>
<!-- Central Shield Icon -->
<div class="relative z-10 w-32 h-32 md:w-40 md:h-40 bg-surface-container-lowest rounded-3xl shadow-xl border border-outline-variant flex items-center justify-center">
<div class="relative w-20 h-20 md:w-24 md:h-24 flex items-center justify-center text-primary">
<span class="material-symbols-outlined text-[80px] md:text-[96px] leading-none" style="font-variation-settings: 'FILL' 1;">shield</span>
<span class="material-symbols-outlined absolute text-[32px] md:text-[40px] text-surface-container-lowest" style="font-variation-settings: 'FILL' 1;">add</span>
</div>
</div>
<!-- Floating Badges -->
<!-- Badge 1: Hébergement local -->
<div class="absolute top-[5%] left-[5%] z-20 animate-float">
<div class="bg-surface-container-lowest/90 backdrop-blur-md px-md py-sm rounded-xl shadow-lg border border-outline-variant flex items-center gap-sm">
<div class="w-8 h-8 rounded-full bg-primary-fixed flex items-center justify-center text-primary">
<span class="material-symbols-outlined text-[20px]">public</span>
</div>
<div class="flex flex-col">
<span class="text-[12px] font-bold text-on-surface leading-tight">Hébergement local</span>
<span class="text-[10px] text-secondary">Algérie</span>
</div>
</div>
</div>
<!-- Badge 2: Chiffrement -->
<div class="absolute top-[20%] right-[2%] z-20 animate-float-delayed">
<div class="bg-surface-container-lowest/90 backdrop-blur-md px-md py-sm rounded-xl shadow-lg border border-outline-variant flex items-center gap-sm">
<div class="w-8 h-8 rounded-full bg-primary-fixed flex items-center justify-center text-primary">
<span class="material-symbols-outlined text-[20px]">lock</span>
</div>
<div class="flex flex-col">
<span class="text-[12px] font-bold text-on-surface leading-tight">Chiffrement</span>
<span class="text-[10px] text-secondary">Sécurisé</span>
</div>
</div>
</div>
<!-- Badge 3: Médecins vérifiés -->
<div class="absolute bottom-[10%] right-[10%] z-20 animate-float-extra-delayed">
<div class="bg-surface-container-lowest/90 backdrop-blur-md px-md py-sm rounded-xl shadow-lg border border-outline-variant flex items-center gap-sm">
<div class="w-8 h-8 rounded-full bg-primary-fixed flex items-center justify-center text-primary">
<span class="material-symbols-outlined text-[20px]">verified_user</span>
</div>
<div class="flex flex-col">
<span class="text-[12px] font-bold text-on-surface leading-tight">Médecins vérifiés</span>
<span class="text-[10px] text-secondary">Agréés par l'État</span>
</div>
</div>
</div>
<!-- Decorative background elements -->
<div class="absolute w-full h-full border-[1px] border-dashed border-outline-variant/30 rounded-full scale-90 pointer-events-none"></div>
<div class="absolute w-full h-full border-[1px] border-dashed border-outline-variant/20 rounded-full scale-110 pointer-events-none rotate-45"></div>
</div>
<!-- Typography & Content -->
<div class="w-full max-w-lg text-center mb-xl">
<h1 class="font-h1 text-h2 md:text-h1 text-on-surface mb-md">
            Vos données, protégées en Algérie
        </h1>
<!-- Features List -->
<div class="inline-flex flex-col items-start gap-md mt-lg mx-auto">
<div class="flex items-center gap-md">
<div class="flex items-center justify-center w-8 h-8 rounded-full bg-primary-fixed text-primary">
<span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<span class="font-body-lg text-secondary text-left">Hébergement local certifié ANPDP</span>
</div>
<div class="flex items-center gap-md">
<div class="flex items-center justify-center w-8 h-8 rounded-full bg-primary-fixed text-primary">
<span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<span class="font-body-lg text-secondary text-left">Chiffrement de bout en bout</span>
</div>
<div class="flex items-center gap-md">
<div class="flex items-center justify-center w-8 h-8 rounded-full bg-primary-fixed text-primary">
<span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<span class="font-body-lg text-secondary text-left">Médecins vérifiés et agréés</span>
</div>
</div>
</div>
</main>
<!-- Bottom Action Shell -->
<footer class="fixed bottom-0 left-0 w-full z-50 px-gutter pb-xl pt-md flex justify-center bg-surface/80 backdrop-blur-xl shadow-[0_-4px_30px_rgba(0,121,107,0.04)]">
<button class="flex items-center justify-center gap-sm bg-primary-container text-on-primary-container font-h3 text-h3-mobile rounded-full px-xl py-md w-full max-w-md hover:scale-[1.02] active:scale-95 transition-all shadow-lg">
        Commencer
        <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</footer>
</body></html>
