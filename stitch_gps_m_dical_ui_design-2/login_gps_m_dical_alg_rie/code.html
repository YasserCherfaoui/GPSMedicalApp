<!DOCTYPE html><html class="light" lang="fr"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;600&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "inverse-surface": "#2d3130",
                        "error": "#ba1a1a",
                        "outline-variant": "#bdc9c5",
                        "secondary": "#526069",
                        "on-tertiary": "#ffffff",
                        "on-secondary-container": "#56656e",
                        "surface-container-lowest": "#ffffff",
                        "on-primary-fixed": "#00201b",
                        "on-background": "#181d1b",
                        "inverse-primary": "#7ad7c6",
                        "on-surface-variant": "#3e4946",
                        "on-tertiary-fixed": "#3a0a00",
                        "on-error": "#ffffff",
                        "primary-fixed": "#97f3e2",
                        "on-surface": "#181d1b",
                        "tertiary-fixed-dim": "#ffb59f",
                        "on-primary-container": "#a1feec",
                        "surface-dim": "#d7dbd8",
                        "surface-container-highest": "#dfe3e1",
                        "tertiary": "#843f29",
                        "surface-bright": "#f6faf8",
                        "surface-container-high": "#e5e9e7",
                        "on-secondary-fixed": "#0f1d25",
                        "tertiary-fixed": "#ffdbd1",
                        "primary-fixed-dim": "#7ad7c6",
                        "secondary-fixed": "#d6e5ef",
                        "primary": "#005e53",
                        "primary-container": "#00796b",
                        "on-secondary": "#ffffff",
                        "on-primary": "#ffffff",
                        "secondary-fixed-dim": "#bac9d3",
                        "on-primary-fixed-variant": "#005047",
                        "surface-container-low": "#f0f4f2",
                        "on-tertiary-fixed-variant": "#75331f",
                        "on-error-container": "#93000a",
                        "tertiary-container": "#a2563f",
                        "surface-variant": "#dfe3e1",
                        "background": "#f6faf8",
                        "secondary-container": "#d3e2ed",
                        "outline": "#6e7a76",
                        "surface": "#f6faf8",
                        "surface-tint": "#006b5e",
                        "surface-container": "#ebefec",
                        "error-container": "#ffdad6",
                        "on-secondary-fixed-variant": "#3b4951",
                        "inverse-on-surface": "#eef2ef",
                        "on-tertiary-container": "#ffe8e2",
                        "brand-orange": "#ff7a45",
                        "brand-navy": "#0a2540"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "xs": "4px",
                        "container-max": "1280px",
                        "lg": "24px",
                        "md": "16px",
                        "unit": "4px",
                        "sm": "8px",
                        "xxl": "48px",
                        "xl": "32px",
                        "gutter": "20px"
                    },
                    "fontFamily": {
                        "label-caps": ["Inter"],
                        "h1": ["Manrope"],
                        "h2": ["Manrope"],
                        "body-md": ["Inter"],
                        "h3": ["Manrope"],
                        "body-lg": ["Inter"]
                    },
                    "fontSize": {
                        "label-caps": ["12px", {"lineHeight": "1.0", "letterSpacing": "0.05em", "fontWeight": "600"}],
                        "h1": ["40px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "h2": ["32px", {"lineHeight": "1.3", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                        "body-md": ["16px", {"lineHeight": "1.5", "letterSpacing": "0em", "fontWeight": "400"}],
                        "h3": ["24px", {"lineHeight": "1.4", "letterSpacing": "0em", "fontWeight": "600"}],
                        "body-lg": ["18px", {"lineHeight": "1.6", "letterSpacing": "0em", "fontWeight": "400"}]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            vertical-align: middle;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            box-shadow: 0 4px 30px rgba(0, 121, 107, 0.04);
        }
    </style>
<style data-stitch-cursor=""></style><style data-stitch-scroll-lock=""></style></head>
<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-surface/80 backdrop-blur-md shadow-sm">
<div class="flex items-center justify-between px-md py-sm w-full max-w-7xl mx-auto h-16">
<button class="text-on-surface-variant hover:opacity-80 active:scale-95 transition-all p-2 rounded-full">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<div class="absolute left-1/2 -translate-x-1/2 flex items-center gap-2">
<img alt="GPS Médical Algérie" class="h-8 w-8 object-contain" src="https://lh3.googleusercontent.com/aida/ADBb0uirN0t8TKHhWjucGD9nDbqdKJl62WBarMm4ERyymvUeNybD9cmuJgu3QT16dJyLoAUS3IZxI_oLEqaM0ZNuQ4MBHouxY6jit4pqhQhgpnyWdpWJRBQVMY0yz__ojDWabRSusoo-pPiWs6y7pb0jQOwcH3MMgX_BnYLAa3ddysQD20DUzVyfj2DoGxVLeUN7NNlYrgdlws8yt-hy-f-nS_GkA81O5tnAdWFC2t96KNlFmtSz5dpyTfaTHYo">
<span class="font-h3 text-h3 font-bold text-primary">GPS Médical Algérie</span>
</div>
<div class="w-10"></div> <!-- Spacer for balance -->
</div>
</header>
<main class="flex-grow pt-24 pb-12 px-gutter flex items-center justify-center">
<div class="w-full max-w-md">
<!-- Hero Section -->
<div class="mb-xl text-center">
<h1 class="font-h1 text-h1 text-brand-navy mb-sm">Connexion</h1>
<p class="font-body-lg text-secondary">Heureux de vous revoir</p>
</div>
<!-- Form Section -->
<div class="glass-card rounded-xl p-xl border border-white">
<form class="space-y-lg">
<!-- Input 1: Phone Number -->
<div class="space-y-xs">
<label class="font-label-caps text-label-caps text-secondary px-xs">NUMÉRO DE TÉLÉPHONE</label>
<div class="relative flex items-center">
<div class="absolute inset-y-0 left-0 pl-md flex items-center pointer-events-none gap-2 border-r border-outline-variant/30 pr-2 my-2">
<span class="material-symbols-outlined text-brand-navy text-[20px]" data-icon="flag">flag</span>
<span class="text-brand-navy font-semibold">+213</span>
</div>
<input class="block w-full h-[52px] pl-28 pr-md bg-[#F7FAFC] border-2 border-transparent focus:border-primary-container focus:bg-white rounded-lg transition-all outline-none font-body-md" placeholder="5XX XX XX XX" type="tel">
</div>
</div>
<!-- Input 2: Password -->
<div class="space-y-xs">
<label class="font-label-caps text-label-caps text-secondary px-xs">MOT DE PASSE</label>
<div class="relative">
<input class="block w-full h-[52px] px-md pr-12 bg-[#F7FAFC] border-2 border-transparent focus:border-primary-container focus:bg-white rounded-lg transition-all outline-none font-body-md" placeholder="••••••••" type="password">
<button class="absolute inset-y-0 right-0 pr-md flex items-center text-secondary hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
<div class="text-right mt-sm">
<a class="font-label-caps text-label-caps text-primary hover:underline transition-all" href="#">Mot de passe oublié ?</a>
</div>
</div>
<!-- Action Section -->
<div class="pt-md space-y-md">
<!-- Primary CTA -->
<button class="w-full h-14 bg-primary text-white font-h3 text-[18px] rounded-lg shadow-md hover:opacity-90 active:scale-95 transition-transform duration-200" type="submit">
                            Se connecter
                        </button>
<div class="relative flex items-center py-sm">
<div class="flex-grow border-t border-outline-variant"></div>
<span class="flex-shrink mx-4 font-label-caps text-label-caps text-secondary">OU</span>
<div class="flex-grow border-t border-outline-variant"></div>
</div>
<!-- Secondary CTA -->
<button class="w-full h-14 border-2 border-outline text-brand-navy font-semibold rounded-lg flex items-center justify-center gap-2 hover:bg-surface-container-low active:scale-[0.98] transition-all duration-200" type="button">
<span class="material-symbols-outlined" data-icon="fingerprint">fingerprint</span>
                            Se connecter avec biométrie
                        </button>
</div>
</form>
</div>
<!-- Footer Section -->
<div class="mt-xl text-center">
<p class="font-body-md text-secondary">
                    Pas encore inscrit ? 
                    <a class="text-brand-orange font-bold ml-1 hover:underline" href="#">Créer un compte</a>
</p>
</div>
</div>
</main>
<!-- Support Help FAB (Contextual) -->
<div class="fixed bottom-lg right-lg">
<button class="h-14 w-14 bg-brand-navy text-white rounded-full shadow-lg flex items-center justify-center hover:scale-110 transition-transform">
<span class="material-symbols-outlined" data-icon="help_outline">help_outline</span>
</button>
</div>


</body></html>
