<!DOCTYPE html><html class="light" lang="fr"><head>

                    "on-primary-fixed-variant": "#005047",
                    "on-primary": "#ffffff",
                    "background": "#f6faf8",
                    "surface-container-highest": "#dfe3e1",
                    "surface-container": "#ebefec",
                    "on-tertiary": "#ffffff",
                    "on-surface-variant": "#3e4946",
                    "secondary-container": "#d3e2ed",
                    "secondary-fixed-dim": "#bac9d3",
                    "primary": "#005e53",
                    "on-tertiary-container": "#ffe8e2",
                    "error-container": "#ffdad6",
                    "error": "#ba1a1a",
                    "tertiary": "#843f29",
                    "primary-fixed-dim": "#7ad7c6",
                    "on-tertiary-fixed-variant": "#75331f",
                    "secondary-fixed": "#d6e5ef",
                    "on-background": "#181d1b",

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .phone-input-shadow {
            box-shadow: 0 4px 30px rgba(0, 121, 107, 0.04);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  <style data-stitch-cursor=""></style><style data-stitch-scroll-lock=""></style></head>
<body class="bg-surface font-body-md text-on-surface min-h-screen flex flex-col items-center">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-md h-16 bg-surface/80 backdrop-blur-md shadow-sm">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-high transition-colors active:scale-95 duration-150">
<span class="material-symbols-outlined text-primary" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-h3 text-h3 font-bold text-primary">Inscription</h1>
<div class="font-label-caps text-label-caps text-secondary px-sm py-xs bg-secondary-container rounded-lg">
            2/5
        </div>
</header>
<!-- Content Area -->
<main class="w-full max-w-lg mt-24 px-md flex-grow flex flex-col">
<!-- Progress Bar Background -->
<div class="w-full h-1 bg-surface-container-highest rounded-full mb-xl overflow-hidden">
<div class="h-full bg-primary-container w-2/5 rounded-full"></div>
</div>
<!-- Typography Section -->
<section class="mb-xl">
<h2 class="font-h2 text-h2 text-on-surface mb-sm">Votre numéro de téléphone</h2>
<p class="font-body-lg text-body-lg text-secondary">
                Nous vous enverrons un code de vérification par SMS
            </p>
</section>
<!-- Custom Phone Input -->
<section class="space-y-sm">
<div class="flex items-center h-16 bg-surface-container-low rounded-xl border-2 border-transparent focus-within:border-primary focus-within:bg-surface transition-all phone-input-shadow">
<!-- Country Code Display -->
<div class="flex items-center gap-sm px-md border-r-2 border-outline-variant h-10 select-none">
<img alt="Algeria Flag" class="w-6 h-4 rounded-xs object-cover" data-alt="A high-quality, professional close-up of the Algerian national flag with crisp colors and fabric texture, set against a clean white clinical background to maintain the medical app's premium aesthetic. The lighting is soft and bright, emphasizing a modern corporate minimalism style consistent with high-end digital healthcare platforms." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAaYo7xkZSwTzA8WBtpidX_3Skp9nsSWhyZuDJF0ustFaF2hzvSPnQ2snhxNeQxGPI9xed5i0AV69Y2zuBC07z415PZSzf-a6oroQw41EcvvDRKrgjaLHwuDD2PgxUCLdctXIygygzeACbNliKvosWsk3kXw0sDx6vPM9dOhJVf-sh8ftQQ5KijsLNMqpfYwvnXtfOKmFXMaANKrh_7n43XQT_w-fyXIifhwNH3huWt-lrqYSLlP1WOTRT16Q5Imo59PKtMVoUrdMQ">
<span class="font-h3 text-h3 text-on-surface-variant">+213</span>
</div>
<!-- Input Field -->
<input class="flex-grow h-full bg-transparent border-none focus:ring-0 px-md font-h3 text-h3 text-on-surface placeholder:text-outline/50" placeholder="5XX XX XX XX" type="tel">
</div>
<p class="font-label-caps text-label-caps text-secondary px-xs flex items-center gap-xs">
<span class="material-symbols-outlined text-[14px]" data-icon="info">info</span>
                Format attendu : +213 5XX, 6XX ou 7XX
            </p>
</section>
<!-- Illustration/Decorative Element (Minimalist) -->
<div class="mt-xl flex-grow flex items-center justify-center">
<div class="relative w-48 h-48 rounded-full bg-secondary-container/20 flex items-center justify-center">
<div class="absolute inset-0 rounded-full border-2 border-dashed border-primary/20 scale-110"></div>
<span class="material-symbols-outlined text-[64px] text-primary/40" data-icon="sms" style="font-variation-settings: 'FILL' 1;">sms</span>
</div>
</div>
</main>
<!-- Bottom Navigation / CTA Area -->
<footer class="w-full max-w-lg p-md pb-xl">
<button class="w-full h-14 hover:scale-[1.02] active:scale-95 transition-all text-on-tertiary font-h3 text-h3 flex items-center justify-center rounded-xl shadow-lg bg-primary-container">
            Envoyer le code
        </button>
<p class="text-center mt-md font-label-caps text-label-caps text-outline">
            En continuant, vous acceptez nos Conditions Générales
        </p>
</footer>


</body></html>
