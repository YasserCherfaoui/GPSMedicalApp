<!DOCTYPE html><html class="light" lang="fr"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">

<style>
    body {
      min-height: max(884px, 100dvh);
    }

  <style data-stitch-cursor=""></style><style data-stitch-scroll-lock=""></style></head>
<body class="bg-surface text-on-surface font-body-md antialiased min-h-screen flex flex-col">
<!-- TopAppBar (Mapped from JSON) -->
<header class="fixed top-0 left-0 w-full z-50 flex items-center px-md h-16 bg-surface/80 dark:bg-surface-container-highest/80 backdrop-blur-md shadow-sm">
<button class="mr-md text-primary dark:text-primary-fixed-dim hover:scale-[1.02] transition-transform duration-200 active:scale-[0.98]">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-h3 text-h3 text-primary dark:text-primary-fixed-dim truncate">
            Récupération du compte
        </h1>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow pt-24 pb-xxl px-gutter max-w-container-max mx-auto w-full flex flex-col items-center">
<!-- Illustration / Visual Anchor -->
<div class="mb-xl w-full max-w-md bg-surface-container-low rounded-xl p-lg flex justify-center items-center shadow-sm">
<div class="relative w-48 h-48">
<div class="absolute inset-0 bg-primary-container/10 rounded-full blur-2xl"></div>
<div class="relative bg-white rounded-full p-lg shadow-[0_4px_30px_rgba(0,121,107,0.06)] flex items-center justify-center border-2 border-primary-container/20">
<span class="material-symbols-outlined text-[64px] text-primary" data-icon="lock_reset" style="font-variation-settings: 'FILL' 1;">lock_reset</span>
</div>
</div>
</div>
<!-- Text Introduction -->
<section class="text-center mb-xl max-w-md">
<h2 class="font-h2 text-h2 text-on-surface mb-sm">Récupérez votre compte</h2>
<p class="font-body-md text-on-surface-variant leading-relaxed">
                Saisissez le numéro de téléphone associé à votre compte. Nous vous enverrons un code de réinitialisation.
            </p>
</section>
<!-- Form Section -->
<form class="w-full max-w-md space-y-lg">
<div class="space-y-sm">
<label class="font-label-caps text-label-caps text-on-surface-variant ml-1 uppercase tracking-wider" for="phone">Numéro de téléphone</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-md flex items-center pointer-events-none space-x-2">
<span class="material-symbols-outlined text-primary" data-icon="flag">flag</span>
<span class="font-body-md font-semibold text-primary">+213</span>
<div class="w-[1px] h-6 bg-outline-variant mx-sm"></div>
</div>
<input class="block w-full h-12 pl-32 pr-md bg-[#F7FAFC] border-transparent rounded-xl font-body-md text-on-surface placeholder:text-on-surface-variant/40 focus:bg-white focus:border-primary-container focus:ring-0 transition-all duration-200 border-2" id="phone" placeholder="5XX XX XX XX" required="" type="tel">
</div>
</div>
</form>
<!-- Dynamic Spacer for layout balance -->
<div class="flex-grow min-h-[32px]"></div>
<!-- Bottom Action Cluster -->
<div class="w-full max-w-md mt-auto space-y-md">
<button class="w-full h-14 text-on-tertiary font-h3 text-h3 rounded-xl shadow-lg hover:scale-[1.02] active:scale-[0.98] transition-all duration-200 flex items-center justify-center space-x-sm bg-primary">
<span class="">Envoyer le code</span>
<span class="material-symbols-outlined" data-icon="send">send</span>
</button>
<p class="text-center font-label-caps text-label-caps text-on-surface-variant/70 italic">
                Le code expire après 5 minutes.
            </p>
</div>
</main>
<!-- Background Decoration (Glassmorphic Orbs for Depth) -->
<div class="fixed top-0 left-0 w-full h-full -z-10 overflow-hidden pointer-events-none">
<div class="absolute top-[-10%] right-[-5%] w-[400px] h-[400px] bg-primary-container/5 rounded-full blur-[80px]"></div>
<div class="absolute bottom-[-5%] left-[-10%] w-[350px] h-[350px] bg-tertiary-container/5 rounded-full blur-[80px]"></div>
</div>


</body></html>
