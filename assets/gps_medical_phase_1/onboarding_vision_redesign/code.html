<!DOCTYPE html>

<html lang="fr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;600&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary-container": "#a2563f",
                        "error-container": "#ffdad6",
                        "outline": "#6e7a76",
                        "outline-variant": "#bdc9c5",
                        "on-error-container": "#93000a",
                        "surface-container-highest": "#dfe3e1",
                        "secondary-fixed": "#d6e5ef",
                        "secondary": "#526069",
                        "inverse-surface": "#2d3130",
                        "on-primary-container": "#a1feec",
                        "on-tertiary-fixed-variant": "#75331f",
                        "on-surface-variant": "#3e4946",
                        "on-primary": "#ffffff",
                        "tertiary-fixed-dim": "#ffb59f",
                        "surface-bright": "#f6faf8",
                        "surface-container": "#ebefec",
                        "on-surface": "#181d1b",
                        "on-secondary-container": "#56656e",
                        "on-tertiary-fixed": "#3a0a00",
                        "background": "#f6faf8",
                        "error": "#ba1a1a",
                        "surface-tint": "#006b5e",
                        "primary-fixed": "#97f3e2",
                        "on-secondary-fixed": "#0f1d25",
                        "surface-container-high": "#e5e9e7",
                        "on-error": "#ffffff",
                        "primary-fixed-dim": "#7ad7c6",
                        "inverse-on-surface": "#eef2ef",
                        "on-primary-fixed-variant": "#005047",
                        "primary-container": "#00796b",
                        "primary": "#005e53",
                        "surface-dim": "#d7dbd8",
                        "on-tertiary": "#ffffff",
                        "tertiary-fixed": "#ffdbd1",
                        "surface": "#f6faf8",
                        "on-secondary-fixed-variant": "#3b4951",
                        "surface-container-low": "#f0f4f2",
                        "on-primary-fixed": "#00201b",
                        "on-background": "#181d1b",
                        "surface-variant": "#dfe3e1",
                        "secondary-container": "#d3e2ed",
                        "inverse-primary": "#7ad7c6",
                        "secondary-fixed-dim": "#bac9d3",
                        "on-tertiary-container": "#ffe8e2",
                        "tertiary": "#843f29"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "xxl": "48px",
                        "container-max": "1280px",
                        "unit": "4px",
                        "lg": "24px",
                        "xl": "32px",
                        "md": "16px",
                        "sm": "8px",
                        "xs": "4px",
                        "gutter": "20px"
                    },
                    "fontFamily": {
                        "h1": ["Manrope"],
                        "body-md": ["Inter"],
                        "body-lg": ["Inter"],
                        "label-caps": ["Inter"],
                        "h3": ["Manrope"],
                        "h2": ["Manrope"]
                    },
                    "fontSize": {
                        "h1": ["40px", { "lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-md": ["16px", { "lineHeight": "1.5", "letterSpacing": "0em", "fontWeight": "400" }],
                        "body-lg": ["18px", { "lineHeight": "1.6", "letterSpacing": "0em", "fontWeight": "400" }],
                        "label-caps": ["12px", { "lineHeight": "1.0", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "h3": ["24px", { "lineHeight": "1.4", "letterSpacing": "0em", "fontWeight": "600" }],
                        "h2": ["32px", { "lineHeight": "1.3", "letterSpacing": "-0.01em", "fontWeight": "600" }]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .visual-container {
            mask-image: linear-gradient(to bottom, black 80%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, black 80%, transparent 100%);
        }
        .blob-bg {
            filter: blur(40px);
            opacity: 0.6;
        }
    </style>
</head>
<body class="bg-background text-on-background font-body-md selection:bg-primary-fixed overflow-hidden">
<main class="min-h-screen flex flex-col items-center max-w-md mx-auto relative px-lg py-xl">
<!-- Dynamic Background Accents -->
<div class="absolute top-0 left-0 w-full h-full pointer-events-none -z-10">
<div class="absolute top-[10%] left-[-10%] w-64 h-64 bg-primary/10 blob-bg rounded-full animate-pulse"></div>
<div class="absolute top-[40%] right-[-15%] w-72 h-72 bg-secondary-container/30 blob-bg rounded-full"></div>
</div>
<!-- Header / Page Indicators -->
<header class="w-full flex justify-center items-center py-md z-20">
<div class="flex gap-sm">
<div class="w-12 h-2 rounded-full bg-primary"></div>
<div class="w-2 h-2 rounded-full bg-outline-variant"></div>
<div class="w-2 h-2 rounded-full bg-outline-variant"></div>
</div>
</header>
<!-- Integrated Illustration Section -->
<section class="w-full flex-grow flex flex-col items-center justify-center relative z-10 visual-container">
<div class="relative w-full max-w-[280px] aspect-[4/5] flex items-center justify-center">
<!-- Stylized chaos-to-clarity visual -->
<div class="absolute inset-0 flex items-center justify-center">
<!-- Abstract "Chaos" path (represented by layered lines/shapes) -->
<svg class="absolute w-full h-full opacity-30" fill="none" viewbox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
<path d="M40 160C40 160 20 120 60 100C100 80 140 120 140 80C140 40 100 20 60 40" stroke="#526069" stroke-dasharray="4 4" stroke-linecap="round" stroke-width="2"></path>
<circle cx="40" cy="160" fill="#526069" r="4"></circle>
</svg>
<!-- "Clarity" focal point -->
<div class="relative z-10 w-full h-full flex flex-col items-center justify-center">
<div class="relative">
<!-- Silhouette or Iconography placeholder -->
<div class="w-48 h-48 bg-white/40 backdrop-blur-md rounded-full border border-white/20 shadow-xl flex items-center justify-center">
<img alt="Clarity visualization" class="w-32 h-32 object-contain" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAO__aOoB8AQ6SSWmcMbKic0Wtmob2HfEZbRj3pnMaSI4-wBQ8syWcO-2NbWRk_d7WS14Y9gFkSmHTUW53RgudJB0H3nigstViON4sC3webENlHLs2wuLrZb0WAjAhSCWDKEBRWTeVwRYEZJlcSBxwt1HfZJyl7x6gEnXF_pjgRfetcyiPCpHPTYcY64CRfdaWzObFzzu7Hu_Mzqi4i1RidoAXWase1KiZqfDNfDhEo9R_rA88byWLWF_enyv7hptH8Z2MfPm8WqLk"/>
</div>
<!-- Accent rings -->
<div class="absolute -inset-4 border border-primary/20 rounded-full animate-ping [animation-duration:3s]"></div>
<div class="absolute -inset-8 border border-primary/10 rounded-full animate-ping [animation-duration:4s]"></div>
</div>
</div>
</div>
</div>
</section>
<!-- Content Section -->
<section class="w-full text-center mt-lg mb-xl z-20">
<h1 class="font-h1 text-h2 text-on-surface mb-md leading-[1.1] tracking-tight">
            De l'errance à l'orientation <span class="text-primary">intelligente</span>
</h1>
<p class="font-body-lg text-body-md text-on-surface-variant px-sm leading-relaxed max-w-[280px] mx-auto">
            Fini le nomadisme médical. Le bon spécialiste, au bon moment, près de chez vous.
        </p>
</section>
<!-- Navigation Footer -->
<nav class="w-full flex items-center justify-between py-md z-20">
<button class="text-on-surface-variant font-body-md px-md py-sm hover:text-primary transition-colors cursor-pointer">
            Passer
        </button>
<button class="flex items-center gap-sm bg-primary text-on-primary px-xl py-md rounded-full font-semibold text-body-md hover:brightness-110 active:scale-95 transition-all shadow-lg shadow-primary/25 group">
            Suivant
            <span class="material-symbols-outlined transition-transform group-hover:translate-x-1">arrow_forward</span>
</button>
</nav>
</main>
<!-- Shared Footer Anchor -->
<footer class="fixed bottom-0 w-full hidden md:block z-50">
<div class="flex justify-between items-center px-lg py-md w-full max-w-container-max mx-auto bg-transparent text-primary font-body-md text-body-md">
<div class="font-label-caps text-label-caps opacity-60">© 2024 GPS Médical Algérie</div>
<div class="flex gap-lg">
<a class="hover:text-primary-container transition-colors cursor-pointer" href="#">Confidentialité</a>
<a class="hover:text-primary-container transition-colors cursor-pointer" href="#">Conditions</a>
</div>
</div>
</footer>
</body></html>
