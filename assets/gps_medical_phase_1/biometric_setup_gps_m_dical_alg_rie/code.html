</header>
<main class="flex-grow flex flex-col items-center justify-center max-w-md w-full px-lg text-center gap-xxl py-xl">
<!-- Center Visual Container -->
<div class="relative">
<!-- Decorative soft circles for premium feel -->
<div class="absolute -z-10 w-64 h-64 bg-primary-container/5 rounded-full blur-3xl -top-12 -left-12"></div>
<!-- Biometric Icon Shell -->
<div class="w-40 h-40 rounded-3xl bg-surface-container-lowest flex items-center justify-center surface-lift relative orange-glow border border-outline-variant/10">
<div class="w-24 h-24 rounded-full bg-brand-orange/10 flex items-center justify-center">
<span class="material-symbols-outlined text-[64px] text-brand-orange" style="font-variation-settings: 'FILL' 0, 'wght' 300;">
                        fingerprint
                    </span>
</div>
<!-- Small secondary icon to imply Face ID + Fingerprint -->
<div class="absolute -bottom-2 -right-2 bg-white p-sm rounded-xl surface-lift border border-outline-variant/10">
<span class="material-symbols-outlined text-primary text-[24px]">Selection</span>
</div>
</div>
</div>
<!-- Content Section -->
<div class="space-y-md">
<h1 class="font-h2 text-h2 text-on-background tracking-tight">
                Activez la connexion biométrique
            </h1>
<p class="font-body-lg text-body-lg text-on-surface-variant px-sm">
                Connectez-vous plus rapidement avec Face ID ou votre empreinte digitale, en toute sécurité.
            </p>
</div>
<!-- Features/Trust Badges (Contextual addition for high-end UI) -->
<div class="grid grid-cols-2 gap-md w-full max-w-sm mt-md">
<div class="flex items-center gap-sm p-md rounded-xl bg-surface-container-low border border-outline-variant/20">
<span class="material-symbols-outlined text-primary text-[20px]">verified_user</span>
<span class="font-label-caps text-label-caps text-on-surface-variant">Sécurisé</span>
</div>
<div class="flex items-center gap-sm p-md rounded-xl bg-surface-container-low border border-outline-variant/20">
<span class="material-symbols-outlined text-primary text-[20px]">bolt</span>
<span class="font-label-caps text-label-caps text-on-surface-variant">Instantané</span>
</div>
</div>
</main>
<!-- Bottom Actions Section -->
<footer class="w-full max-w-md px-lg pb-xxl flex flex-col gap-md">
<button class="w-full h-14 text-white font-label-caps text-body-md rounded-xl shadow-lg hover:scale-[1.02] active:scale-[0.98] transition-all flex items-center justify-center gap-sm bg-primary">
