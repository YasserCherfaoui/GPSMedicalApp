<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .check-animate {
            animation: stroke 0.6s cubic-bezier(0.65, 0, 0.45, 1) forwards;
        }
        @keyframes stroke {
            100% { stroke-dashoffset: 0; }
        }
        .glass-panel {
            background: rgba(246, 250, 248, 0.8);
            backdrop-filter: blur(12px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md">
<!-- Top App Bar -->
<header class="fixed top-0 w-full z-50 bg-surface/80 backdrop-blur-md shadow-sm h-16 flex items-center justify-between px-md">
<button class="text-primary hover:opacity-80 transition-opacity active:scale-95 duration-200">
<span class="material-symbols-outlined">menu</span>
</button>
<h1 class="font-h3 text-h3 font-bold text-primary">GPS Médical Algérie</h1>
<div class="w-8 h-8 rounded-full bg-secondary-container overflow-hidden">
<img alt="User" data-alt="A professional close-up of a user profile avatar in a clean, minimalist medical application. The lighting is soft and bright, reflecting a high-end clinical aesthetic. The style is modern corporate minimalism with a calm and trustworthy mood, utilizing a primary palette of teal and soft whites." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDMED3ncEud75Wlw5cF8pw1TWBExZE068tH8JC5iQH6wdnfNLd9lncWBVM0IgaIornusV8eVYHc2sYoVFWOJGbh8KzLo5TctRiuq2xqUetL_3_DCODC8wDqG9p83VP4XVkbrMlld2sgAwi0nUXCJEC7Z0S1pG9hnd7JpPuho4b_zGYdOvm27rz6raq2Vh3Z7e9UMAADE8iciTXxDkWlE2iRcm__Ji_daWbgbAs1HzoNdOuWBSEcw7cXF_bFEQzPi8KFikFi4lqMJCk"/>
</div>
</header>
<main class="flex-grow flex flex-col items-center justify-center px-gutter pt-xxl pb-xxl mt-16 max-w-lg mx-auto text-center">
<!-- Center-aligned status -->
<span class="font-label-caps text-label-caps text-primary tracking-widest uppercase mb-sm">Confirmation</span>
<!-- Animated Check Icon -->
<div class="relative mb-lg">
<div class="w-32 h-32 rounded-full bg-primary/10 flex items-center justify-center animate-pulse">
<svg class="w-20 h-20 text-primary" fill="none" stroke="currentColor" stroke-width="2.5" viewbox="0 0 24 24">
<path class="check-animate" d="M5 13l4 4L19 7" stroke-linecap="round" stroke-linejoin="round" style="stroke-dasharray: 50; stroke-dashoffset: 50;"></path>
</svg>
</div>
<!-- Decorative ring -->
<div class="absolute inset-0 rounded-full border-2 border-primary/20 scale-125 opacity-20"></div>
</div>
<!-- Typography -->
<h2 class="font-h2 text-h2 text-on-surface mb-md">Demande envoyée !</h2>
<p class="font-body-md text-on-surface-variant mb-xl max-w-sm">
            Votre conseiller GPS Médical va coordonner votre rendez-vous avec le <span class="font-semibold">Dr. Benali</span> et vous recontacter rapidement.
        </p>
<!-- Summary Card -->
<div class="w-full bg-surface-container-lowest rounded-xl shadow-[0_30px_30px_rgba(0,121,107,0.04)] p-lg text-left space-y-md border border-outline-variant/30">
<div class="flex items-center gap-md">
<div class="w-12 h-12 rounded-full border-2 border-primary-fixed overflow-hidden">
<img alt="Dr Karim Benali" data-alt="A professional medical headshot of Dr. Karim Benali, an Algerian specialist, wearing a clean white clinical coat. The background is a blurred high-end medical facility with soft teal accents. The lighting is bright and reassuring, reflecting clinical precision and compassionate care. The overall style is premium and modern." src="https://lh3.googleusercontent.com/aida-public/AB6AXuC7Vvy1QZNIUV0yMY8ADtmTaNbQXqxSYE7O1bvHqPDINVmq3HZ9nyNUhfUEDXL4x4vr_oQvypmzrz8-ZYg_ilQWlqZ_gPyVyVqC-AQWeHznNYbrD1r9RpQS9nw6l15uvLIWMHiXnfO3K2H7mMwLig1g8m6u7tsUyYhNk0HIHFtWHceCfhVzAbbwJ1KWBSs5K-7jpC-8IQP2I6yJGdCO1R8HDgcFO--rEPLXM9a1mKrYth_lME1ccTbCI-BTp8OBtBAwmpLnl7H4E4M"/>
</div>
<div>
<p class="font-label-caps text-label-caps text-on-surface-variant">Spécialiste</p>
<p class="font-h3 text-h3 text-on-surface">Dr. Karim Benali</p>
</div>
</div>
<div class="h-px bg-outline-variant/20 w-full"></div>
<div class="flex items-center justify-between">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-primary">description</span>
<span class="font-body-md text-on-surface">Bilan #2026-0312 partagé</span>
</div>
<span class="bg-primary/10 text-primary px-sm py-1 rounded-full font-label-caps text-[10px]">DOCUMENT</span>
</div>
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-primary">person_pin_circle</span>
<span class="font-body-md text-on-surface">Consultation en présentiel</span>
</div>
</div>
<!-- Action Buttons -->
<div class="w-full mt-xl space-y-md">
<button class="w-full h-12 bg-primary text-on-primary rounded-full font-h3 text-h3 shadow-lg hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-sm">
<span class="material-symbols-outlined">chat</span>
                Ouvrir la conversation
            </button>
<button class="w-full h-12 text-primary font-h3 text-h3 hover:bg-primary/5 rounded-full transition-colors active:scale-[0.98]">
                Retour à l'accueil
            </button>
</div>
</main>
<!-- Bottom Nav Bar (Suppressed because this is a success/transactional screen, but kept as a hidden reference for the structure if required by system logic) -->
<!-- The "Relevance Check" logic suggests suppressing nav for success screens. If forced to render, it would be here. -->
<script>
        // Micro-interaction for the checkmark
        window.addEventListener('DOMContentLoaded', () => {
            const path = document.querySelector('.check-animate');
            if (path) {
                path.style.strokeDashoffset = '50';
                setTimeout(() => {
                    path.style.strokeDashoffset = '0';
                }, 300);
            }
        });
    </script>
</body></html>
