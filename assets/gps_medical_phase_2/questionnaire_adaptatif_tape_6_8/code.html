<script>
        // Simple micro-interaction for radio cards
        document.querySelectorAll('input[type="radio"]').forEach(radio => {
            radio.addEventListener('change', function() {
                // Since Peer handles the styling, we just add a small haptic-like animation via JS
                if(this.checked) {
                    const card = this.nextElementSibling;
                    card.classList.add('scale-[0.98]');
                    setTimeout(() => {
                        card.classList.remove('scale-[0.98]');
                    }, 100);
                }
            });
        });

        // Atmospheric effect: subtle ambient glow following the mouse on desktop
        if (window.innerWidth > 768) {
            const glow = document.createElement('div');
            glow.className = 'fixed pointer-events-none w-[600px] h-[600px] rounded-full blur-[100px] bg-primary/5 -z-10 transition-opacity duration-500 opacity-0';
            document.body.appendChild(glow);

            document.addEventListener('mousemove', (e) => {
                glow.style.opacity = '1';
                glow.style.left = `${e.clientX - 300}px`;
                glow.style.top = `${e.clientY - 300}px`;
            });
        }
    </script>
