<script>
        // Simple Interaction: Toggle active state of chips (visual only for demo)
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', function() {
                if (this.innerText === 'DOS' || this.innerText === 'FACE') {
                    this.parentElement.querySelectorAll('button').forEach(b => {
                        b.classList.remove('bg-primary-container', 'text-on-primary-container');
                        b.classList.add('text-on-surface-variant');
                    });
                    this.classList.remove('text-on-surface-variant');
                    this.classList.add('bg-primary-container', 'text-on-primary-container');
                }
            });
        });

        // Atmospheric parallax effect on figure
        document.addEventListener('mousemove', (e) => {
            const figure = document.querySelector('.anatomical-canvas img');
            if (figure) {
                const moveX = (e.clientX - window.innerWidth / 2) * 0.01;
                const moveY = (e.clientY - window.innerHeight / 2) * 0.01;
                figure.style.transform = `translate(${moveX}px, ${moveY}px)`;
            }
        });
    </script>
