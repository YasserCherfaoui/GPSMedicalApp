<!DOCTYPE html>

<html lang="fr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-tertiary": "#ffffff",

                    "surface": "#f6faf8",
                    "on-primary-fixed-variant": "#005047",
                    "on-error-container": "#93000a",
                    "tertiary-container": "#a2563f",
                    "surface-container-lowest": "#ffffff",
                    "secondary-fixed-dim": "#bac9d3",
                    "tertiary-fixed-dim": "#ffb59f",
                    "on-primary-fixed": "#00201b",
                    "surface-container": "#ebefec",
                    "surface-bright": "#f6faf8",
                    "on-error": "#ffffff",
                    "inverse-surface": "#2d3130",
                    "tertiary-fixed": "#ffdbd1",
                    "background": "#f6faf8",
                    "primary-fixed-dim": "#7ad7c6",
                    "error": "#ba1a1a",
                    "surface-container-highest": "#dfe3e1",
                    "surface-dim": "#d7dbd8",
                    "on-primary": "#ffffff",
                    "secondary-container": "#d3e2ed",
                    "tertiary": "#843f29",
                    "secondary-fixed": "#d6e5ef",

                    "on-secondary-fixed-variant": "#3b4951",
                    "surface-container-low": "#f0f4f2",
                    "primary": "#005e53",
                    "secondary": "#526069",
                    "surface-tint": "#006b5e",
                    "on-secondary-fixed": "#0f1d25",
                    "error-container": "#ffdad6",
                    "outline-variant": "#bdc9c5",
                    "on-secondary": "#ffffff",
                    "primary-container": "#00796b",
                    "on-surface-variant": "#3e4946",
                    "on-primary-container": "#a1feec",
                    "outline": "#6e7a76",
                    "on-tertiary-fixed-variant": "#75331f",
                    "on-background": "#181d1b",

            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "unit": "4px",
                    "lg": "24px",
                    "md": "16px",
                    "sm": "8px",
                    "xl": "32px",
                    "xs": "4px",
                    "gutter": "20px",
                    "xxl": "48px",
                    "container-max": "1280px"
            },
            "fontFamily": {
                    "body-lg": ["Inter"],
                    "body-md": ["Inter"],
                    "h3": ["Manrope"],
                    "label-caps": ["Inter"],
                    "h2": ["Manrope"],
                    "h1": ["Manrope"]
            },
            "fontSize": {
                    "body-lg": ["18px", {"lineHeight": "1.6", "letterSpacing": "0em", "fontWeight": "400"}],
                    "body-md": ["16px", {"lineHeight": "1.5", "letterSpacing": "0em", "fontWeight": "400"}],
                    "h3": ["24px", {"lineHeight": "1.4", "letterSpacing": "0em", "fontWeight": "600"}],
                    "label-caps": ["12px", {"lineHeight": "1.0", "letterSpacing": "0.05em", "fontWeight": "600"}],

                    "h1": ["40px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700"}]

          },
        },
      }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .emergency-pulse {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.85; }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-emergency-red overflow-hidden selection:bg-white/30 selection:text-white">
<!-- Emergency Overlay Content -->
<main class="relative min-h-screen w-full flex flex-col items-center justify-center px-lg py-xxl text-center">
<!-- Background Subtle Texture -->
<div class="absolute inset-0 opacity-10 pointer-events-none bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-white via-transparent to-transparent"></div>
<!-- Warning Icon Cluster -->
<div class="mb-xl relative">
<div class="absolute inset-0 bg-white/20 rounded-full blur-3xl emergency-pulse"></div>
<span class="material-symbols-outlined text-[80px] md:text-[120px] text-white relative z-10 block" data-icon="warning" style="font-variation-settings: 'FILL' 1;">warning</span>
</div>
<!-- Headline & Messaging -->
<div class="max-w-[600px] mb-xxl space-y-md relative z-10">
<h1 class="font-h1 text-h1 text-white tracking-tight leading-tight">
                Attention — consultation urgente recommandée
            </h1>
<p class="font-body-lg text-body-lg text-white/90 max-w-md mx-auto">
                Certains signes détectés nécessitent une prise en charge médicale immédiate. Ne tardez pas.
            </p>
</div>
<!-- Action Card -->
<div class="w-full max-w-[440px] bg-white rounded-xl shadow-[0_30px_60px_-12px_rgba(0,0,0,0.25)] p-xl md:p-xxl flex flex-col gap-md relative z-10">
<!-- Primary Emergency Call Button -->
<button class="w-full h-14 bg-emergency-red hover:bg-red-700 transition-all duration-300 transform active:scale-95 flex items-center justify-center gap-sm rounded-lg group shadow-md shadow-emergency-red/20">
<span class="material-symbols-outlined text-white" data-icon="call" style="font-variation-settings: 'FILL' 1;">call</span>
<span class="text-white font-h3 text-[18px] font-bold">Appeler le 14 (urgences)</span>
</button>
<!-- Secondary Search Button -->
<button class="w-full h-14 border-2 border-emergency-red hover:bg-red-50 transition-all duration-300 transform active:scale-95 flex items-center justify-center gap-sm rounded-lg">
<span class="material-symbols-outlined text-emergency-red" data-icon="emergency_home">emergency_home</span>
<span class="text-emergency-red font-h3 text-[18px] font-bold">Voir les urgences proches</span>
</button>
</div>
<!-- Safe Exit Link -->
<div class="mt-xl relative z-10">
<button class="font-label-caps text-label-caps text-white/70 hover:text-white underline underline-offset-4 transition-colors duration-200">
                J'ai compris, continuer quand même
            </button>
</div>
<!-- Decorative UI Element (Algerian Map Pattern Subtle Overlay) -->
<div class="fixed bottom-[-10%] right-[-10%] w-[500px] h-[500px] opacity-5 pointer-events-none">
<img alt="Algerian Map Geometric Pattern" class="w-full h-full object-contain" data-alt="A stylized minimalist map of Algeria rendered in thin, sharp white geometric lines against a deep emergency red background. The design is clean and professional, evoking high-technology and medical precision. The lighting is perfectly flat to maintain the corporate minimalist aesthetic. The overall mood is serious and urgent, serving as an abstract background element for an emergency medical interface." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCHpfi42nNyAUVsBYi57M-dtlV0B60GeZ7DWlvi2qgpl-WPXj5J4nAkt2iYczIJfF8M7FG5JeM1mGxiMNI7lMAkYpVrlbN4gP25jI3794FT4jC9oTtIs4qSU-gOpcTMN45WEKDZ4EGrZ5z-z2ho596xTPV2rRvSzbdGKXs1t3KGNRDkejbEQaGCh27D1tFfGqP08uRTvcCFfQX-bSusLjlSnetqm14nev7FBGzbZCTdimbnguZ-tZ1Fz_5xFmAbN84_fE_4ROAbUA4"/>
</div>
</main>
<script>
        // Simple micro-interaction for button press feedback
        document.querySelectorAll('button').forEach(button => {
            button.addEventListener('touchstart', () => {
                button.classList.add('opacity-80');
            });
            button.addEventListener('touchend', () => {
                button.classList.remove('opacity-80');
            });
        });
    </script>
</body></html>
