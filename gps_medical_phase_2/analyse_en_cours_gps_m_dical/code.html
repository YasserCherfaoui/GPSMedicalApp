<script>
        // Rotating Status Lines Logic
        const statusLines = [
            "Évaluation du type de douleur",
            "Croisement avec la base de pathologies",
            "Calcul du score de pertinence"
        ];
        let currentStatusIndex = 0;
        const statusElement = document.getElementById('status-line');

        function rotateStatus() {
            // Fade out
            statusElement.style.opacity = '0';
            statusElement.style.transform = 'translateY(-10px)';

            setTimeout(() => {
                currentStatusIndex = (currentStatusIndex + 1) % statusLines.length;
                statusElement.textContent = statusLines[currentStatusIndex];
                
                // Fade in
                statusElement.style.opacity = '1';
                statusElement.style.transform = 'translateY(0)';
            }, 500);
        }

        // Circular Progress Logic
        const circle = document.getElementById('progress-ring');
        const radius = circle.r.baseVal.value;
        const circumference = radius * 2 * Math.PI;
        circle.style.strokeDasharray = `${circumference} ${circumference}`;
        circle.style.strokeDashoffset = `${circumference}`;

        function setProgress(percent) {
            const offset = circumference - (percent / 100 * circumference);
            circle.style.strokeDashoffset = offset;
        }

        // Simulating Progress and Rotation
        let progressVal = 0;
        
        // Progress ring animation
        const progressInterval = setInterval(() => {
            progressVal += 0.5;
            setProgress(progressVal);
            if (progressVal >= 100) {
                // In a real app, this would redirect or show the result
                // For demo purposes, we loop back after a pause
                setTimeout(() => {
                    progressVal = 0;
                }, 2000);
            }
        }, 50);

        // Text rotation interval
        const statusInterval = setInterval(rotateStatus, 3500);

        // Cleanup (optional in this context)
        window.addEventListener('unload', () => {
            clearInterval(progressInterval);
            clearInterval(statusInterval);
        });
    </script>
