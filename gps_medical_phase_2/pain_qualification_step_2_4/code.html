<html class="light" lang="fr"><head>
<meta charset="utf-8"/>

        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 24px;
            height: 24px;
            background: #00796B;
            cursor: pointer;
            border-radius: 50%;
            border: 4px solid #ffffff;
            box-shadow: 0 4px 10px rgba(0, 121, 107, 0.2);
        }
        input[type="range"]::-moz-range-thumb {
            width: 24px;
            height: 24px;
            background: #00796B;
            cursor: pointer;
            border-radius: 50%;
            border: 4px solid #ffffff;
            box-shadow: 0 4px 10px rgba(0, 121, 107, 0.2);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
    </style>

          darkMode: "class",

            extend: {
              "colors": {

                      "tertiary-container": "#a2563f",
                      "surface-container-low": "#f0f4f2",
                      "surface": "#f6faf8",
                      "surface-dim": "#d7dbd8",
                      "secondary-container": "#d3e2ed",

                      "primary": "#005e53",
                      "outline-variant": "#bdc9c5",
                      "surface-bright": "#f6faf8",
                      "on-secondary-fixed-variant": "#3b4951",
                      "on-primary-fixed": "#00201b",
                      "on-tertiary-fixed": "#3a0a00",
                      "inverse-surface": "#2d3130",
                      "on-primary-fixed-variant": "#005047",
                      "on-primary-container": "#a1feec",
                      "surface-container-lowest": "#ffffff",
                      "inverse-primary": "#7ad7c6",
                      "tertiary-fixed-dim": "#ffb59f",
                      "on-secondary-container": "#56656e",
                      "secondary-fixed-dim": "#bac9d3",
                      "on-tertiary": "#ffffff",
                      "on-error": "#ffffff",
                      "surface-tint": "#006b5e",
                      "surface-container": "#ebefec",
                      "tertiary": "#843f29",
                      "secondary-fixed": "#d6e5ef",
                      "surface-variant": "#dfe3e1",
                      "on-tertiary-fixed-variant": "#75331f",
                      "inverse-on-surface": "#eef2ef",
                      "surface-container-high": "#e5e9e7",
                      "primary-container": "#00796b",
                      "primary-fixed-dim": "#7ad7c6",
                      "on-error-container": "#93000a",

              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "xxl": "48px",
                      "md": "16px",
                      "gutter": "20px",
                      "xl": "32px",
                      "unit": "4px",
                      "container-max": "1280px",
                      "xs": "4px",
                      "lg": "24px",
                      "sm": "8px"

                      "label-caps": ["12px", {"lineHeight": "1.0", "letterSpacing": "0.05em", "fontWeight": "600"}],

<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body-md min-h-screen pb-xxl">
<!-- Top App Bar -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-md py-sm bg-surface/80 backdrop-blur-md shadow-sm">
<div class="flex items-center gap-md">
<button class="active:scale-[0.98] transition-all hover:scale-[1.02] transition-transform duration-200">
<span class="material-symbols-outlined text-primary" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-h3 text-h3 text-primary">Décrivez votre douleur</h1>
</div>
<div class="w-8"></div> <!-- Spacer for balance -->
</header>
<main class="pt-[80px] px-gutter max-w-container-max mx-auto">
<!-- Selection Chip -->
<div class="flex justify-center mb-xl">
<div class="inline-flex items-center gap-sm bg-primary-container text-on-primary rounded-full px-4 py-2 shadow-sm animate-fade-in">
<span class="font-label-caps text-label-caps">Genou droit</span>
<button class="flex items-center justify-center hover:opacity-80">
<span class="material-symbols-outlined text-[18px]" data-icon="close">close</span>
</button>
</div>
</div>
<!-- Section 1: Intensity -->
<section class="mb-xxl">
<div class="flex justify-between items-end mb-lg">
<h2 class="font-h3 text-h3">Intensité</h2>
<div class="w-12 h-12 rounded-full bg-primary-container text-on-primary flex items-center justify-center font-h3 text-h3 shadow-lg transition-all duration-300 transform scale-110" id="intensity-bubble">
                    6
                </div>
</div>
<div class="relative pt-6 pb-2">
<input class="w-full h-2 bg-surface-container-highest rounded-lg appearance-none cursor-pointer accent-primary-container" id="intensity-slider" max="10" min="0" type="range" value="6"/>
<div class="flex justify-between mt-md px-1">
<span class="font-label-caps text-label-caps text-on-surface-variant">Légère</span>
<span class="font-label-caps text-label-caps text-on-surface-variant">Intense</span>
</div>
</div>
</section>
<!-- Section 2: Type -->
<section class="mb-xxl">
<h2 class="font-h3 text-h3 mb-lg">Type de douleur</h2>
<div class="grid grid-cols-1 md:grid-cols-2 gap-md">
<!-- Card 1 (Selected) -->
<button class="type-card group flex flex-col items-start p-lg bg-surface-container-lowest rounded-xl border-2 border-primary-container shadow-[0_4px_30px_rgba(0,121,107,0.04)] text-left active:scale-[0.98] transition-all duration-200" onclick="selectType(this)">
<div class="w-12 h-12 rounded-lg bg-secondary-container flex items-center justify-center mb-md group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-primary text-[28px]" data-icon="settings_accessibility">settings_accessibility</span>
</div>
<h3 class="font-h3 text-body-lg font-bold mb-xs">Mécanique</h3>
<p class="text-on-surface-variant text-sm">déclenchée par le mouvement</p>
</button>
<!-- Card 2 -->
<button class="type-card group flex flex-col items-start p-lg bg-surface-container-lowest rounded-xl border-2 border-transparent shadow-[0_4px_30px_rgba(0,121,107,0.04)] text-left active:scale-[0.98] transition-all duration-200" onclick="selectType(this)">
<div class="w-12 h-12 rounded-lg bg-tertiary-fixed flex items-center justify-center mb-md group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-tertiary text-[28px]" data-icon="local_fire_department">local_fire_department</span>
</div>
<h3 class="font-h3 text-body-lg font-bold mb-xs">Inflammatoire</h3>
<p class="text-on-surface-variant text-sm">présente au repos, la nuit</p>
</button>
</div>
</section>
<!-- Section 3: Onset -->
<section class="mb-xxl">
<h2 class="font-h3 text-h3 mb-lg">Début</h2>
<div class="bg-surface-container-high p-1 rounded-xl flex gap-1">
<button class="onset-btn flex-1 py-3 px-4 rounded-lg bg-primary-container text-on-primary font-label-caps text-label-caps shadow-sm transition-all duration-200" onclick="selectOnset(this)">
                    Aiguë (&lt; 6 sem.)
                </button>
<button class="onset-btn flex-1 py-3 px-4 rounded-lg text-on-surface-variant font-label-caps text-label-caps hover:bg-surface-container-highest transition-all duration-200" onclick="selectOnset(this)">
                    Chronique (&gt; 6 sem.)
                </button>
</div>
</section>
<!-- Image Illustration -->
<section class="mb-xxl">
<div class="rounded-xl overflow-hidden h-[200px] relative shadow-lg">
<img alt="Medical context" class="w-full h-full object-cover" data-alt="A clean, minimalist medical consultation room with bright, natural lighting. A digital interface showing a 3D anatomical model of a human knee is displayed on a sleek tablet. The atmosphere is professional, clinical, and high-tech, utilizing a calm color palette of soft whites and deep teal accents to evoke a sense of precision and compassionate healthcare." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBEIoRK8KHpy6BXD2E0p0NJdRuT2hXUa8-AF5ljfHFNzpPnCru_8M05H0FY9Akf2sthh4FoQUea8roPCFHM9m26aT7Y9416b8JlCHZCWrthXEdzMf6S50YDqUK6rZzltk5mER5EQFD5gVBDGhRTq7sZUHj2NsFxURU9MZnFd_12hVyYZNV35vtySZ5inf2dQchZtXBgznYM5AgHb3cqgEaeHfoGFBWcRtqhDFk3-ZGvwfnp2zEc66LB6HWcDvfRp18_DVCf0UbxChU"/>
<div class="absolute inset-0 bg-gradient-to-t from-black/40 to-transparent"></div>
</div>
</section>
</main>
<!-- Fixed Footer -->
<footer class="fixed bottom-0 left-0 w-full z-50 p-md glass-card border-t border-outline-variant/10">
<div class="max-w-container-max mx-auto">
<button class="w-full bg-primary-container text-on-primary font-h3 text-h3 py-4 rounded-xl shadow-lg active:scale-[0.97] hover:scale-[1.01] transition-all duration-200 flex items-center justify-center gap-md">
                Continuer
                <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</footer>
<script>
        // Intensity Slider Logic
        const slider = document.getElementById('intensity-slider');
        const bubble = document.getElementById('intensity-bubble');

        slider.addEventListener('input', () => {
            bubble.textContent = slider.value;
            // Pulse effect
            bubble.classList.remove('scale-110');
            void bubble.offsetWidth; // Trigger reflow
            bubble.classList.add('scale-110');
        });

        // Type Card Selection Logic
        function selectType(element) {
            document.querySelectorAll('.type-card').forEach(card => {
                card.classList.remove('border-primary-container');
                card.classList.add('border-transparent');
            });
            element.classList.remove('border-transparent');
            element.classList.add('border-primary-container');
        }

        // Onset Toggle Logic
        function selectOnset(element) {
            document.querySelectorAll('.onset-btn').forEach(btn => {
                btn.classList.remove('bg-primary-container', 'text-on-primary', 'shadow-sm');
                btn.classList.add('text-on-surface-variant');
            });
            element.classList.remove('text-on-surface-variant');
            element.classList.add('bg-primary-container', 'text-on-primary', 'shadow-sm');
        }
    </script>
</body></html>
